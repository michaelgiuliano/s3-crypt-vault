[project]
name = "s3-crypt-vault"
version = "0.2.1"
description = "CLI tool for client-side encrypted AWS S3 storage."
authors = [{name = "Michael Giuliano"}]
readme = "README.md"
requires-python = ">=3.12"

dependencies = [
    "boto3",
    "cryptography",
    "python-dotenv",
    "typer",
]

[project.scripts]
s3vault = "app.cli:app"

[tool.setuptools.packages.find]
include = ["app*"]
exclude = ["volume*", "tests*"]

[tool.flake8]
max-line-length = 100
exclude = [
    ".venv",
    "venv",
    "__pycache__",
    "volume"
]